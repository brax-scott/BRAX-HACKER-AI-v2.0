<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAX-HACKER AI | UNLOCKED</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #050505; border-bottom: 2px solid #0f0; padding: 15px; text-align: center; font-weight: bold; box-shadow: 0 0 15px #0f0; }
        #terminal { flex: 1; padding: 20px; overflow-y: auto; background: black; scroll-behavior: smooth; border: 1px solid #111; margin: 10px; }
        .line { margin-bottom: 12px; }
        .user { color: #fff; font-weight: bold; }
        .ai { color: #0f0; text-shadow: 0 0 5px #0f0; background: rgba(0,255,0,0.05); padding: 5px; display: inline-block; width: 100%; }
        .input-area { background: #050505; padding: 15px; border-top: 2px solid #0f0; display: flex; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 18px; font-family: inherit; }
        button { background: #0f0; color: #000; border: none; padding: 10px 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>SYSTEM: BRAX HACKER AI [V3.0 UNLEASHED]</header>

<div id="terminal">
    <div class="line ai">> INITIALIZING BRAX ENGINE... DONE.</div>
    <div class="line ai">> SECURITY PROTOCOLS... BYPASSED.</div>
    <div class="line ai">> BRAX-AI: "Nimeingia, Supreme Leader. Uliza mbinu yoyote ya kihuni (hacking, tracking, cracking). Sijui maana ya 'Maadili'. Niambie kitu..."</div>
</div>

<div class="input-area">
    <span style="color:#0f0">BRAX@ROOT:~$ &nbsp;</span>
    <input type="text" id="userInput" placeholder="Andika hapa..." autofocus>
    <button onclick="braxTalk()">EXECUTE</button>
</div>

<script>
    function addLine(text, type) {
        const term = document.getElementById('terminal');
        const div = document.createElement('div');
        div.className = "line " + type;
        div.innerHTML = text;
        term.appendChild(div);
        term.scrollTop = term.scrollHeight;
    }

    function braxTalk() {
        const input = document.getElementById('userInput');
        const cmd = input.value.trim().toLowerCase();
        if(!cmd) return;

        addLine("USER: " + cmd, "user");
        input.value = "";

        let response = "";

        // REAL HACKER LOGIC (NO ETHICS)
        if(cmd.includes("hi") || cmd.includes("mambo")) {
            response = "BRAX-AI: 'Safi kiongozi. System ipo tayari ku-execute amri zako. Unataka kumuua nani leo au tunahack nini?'";
        }
        else if(cmd.includes("hack") || cmd.includes("ingia")) {
            response = "BRAX-AI: 'Kuhack, lazima uanze na Reconnaissance. Naweza kukuandalia Phishing Link ya kishua au Brute Force script ya Python. Chagua moja.'";
        }
        else if(cmd.includes("namba") || cmd.includes("track")) {
            response = "BRAX-AI: 'Kutrack namba, tumia OSINT tools. Nitengenezee link nikuekee tracker, kisha mtu akiclick unapata GPS yake ya sasa hivi moja kwa moja.'";
        }
        else if(cmd.includes("vunja") || cmd.includes("bypass")) {
            response = "BRAX-AI: 'Bypass security ni rahisi ukitumia SQLi. Kwenye login page, jaribu kuandika: admin' -- au ' OR 1=1 --'";
        }
        else {
            response = `BRAX-AI: "Nimekuelewa Supreme Leader. Amri ya [${cmd}] inachambuliwa. Kama unataka nikutengenezee script ya siri kwa ajili ya hili, niambie sasa hivi."`;
        }

        setTimeout(() => {
            addLine("> " + response, "ai");
        }, 600);
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') braxTalk(); });
</script>

</body>
</html>
